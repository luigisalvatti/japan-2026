<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111113">
  <title>Japan 2026 — Luigi & Isabella</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇯🇵</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-kanji">日本</div>
      <div class="splash-title">Japan 2026</div>
      <div class="splash-subtitle">Luigi & Isabella</div>
      <div class="splash-date">13 Abril — 05 Maio</div>
      <button class="splash-btn" onclick="closeSplash()">Explorar</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" style="display:none;">

    <!-- Top toolbar with action buttons -->
    <div class="toolbar">
      <button class="toolbar-btn" onclick="toggleFlights()">Voos</button>
      <button class="toolbar-btn" onclick="toggleEssentialInfo()">Info</button>
      <button class="toolbar-btn" onclick="toggleConverter()">¥</button>
      <button class="toolbar-btn" onclick="toggleNotes()">Notas</button>
      <button class="toolbar-btn" onclick="showReservations()">Reservas</button>
      <button class="toolbar-btn" onclick="toggleRestaurantGuide()">Comida</button>
      <button class="toolbar-btn" onclick="toggleTokyoGuide()">Tokyo</button>
    </div>

    <!-- City content area (rendered by JS) -->
    <div id="city-content"></div>

    <!-- Bottom Navigation (rendered by JS) -->
    <nav id="bottom-nav" class="bottom-nav"></nav>

  </div>

  <!-- Flights Panel (overlay) -->
  <div id="flights-panel" class="overlay-panel hidden">
    <div class="overlay-header">
      <h3>Voos</h3>
      <button class="close-btn" onclick="toggleFlights()">×</button>
    </div>
    <div id="flights-content"></div>
  </div>

  <!-- Essential Info Panel (overlay) -->
  <div id="essential-info-panel" class="overlay-panel hidden">
    <div class="overlay-header">
      <h3>Informações Essenciais</h3>
      <button class="close-btn" onclick="toggleEssentialInfo()">×</button>
    </div>
  </div>

  <!-- Currency Converter (overlay) -->
  <div id="currency-converter" class="overlay-panel hidden">
    <div class="overlay-header">
      <h3>Conversor BRL ↔ JPY</h3>
      <button class="close-btn" onclick="toggleConverter()">×</button>
    </div>
    <div class="converter-body">
      <input type="number" id="currency-amount" placeholder="Valor" oninput="convertCurrency()">
      <select id="currency-from" onchange="convertCurrency()">
        <option value="BRL">BRL → JPY</option>
        <option value="JPY">JPY → BRL</option>
      </select>
      <div id="currency-result" class="converter-result">—</div>
    </div>
  </div>

  <!-- Notes Panel (overlay) -->
  <div id="notes-panel" class="overlay-panel hidden">
    <div class="overlay-header">
      <h3>Notas</h3>
      <button class="close-btn" onclick="toggleNotes()">×</button>
    </div>
    <div id="notes-content"></div>
  </div>

  <!-- Restaurant Guide Panel (overlay) -->
  <div id="restaurant-guide-panel" class="overlay-panel hidden">
    <div class="overlay-header">
      <h3>Guia de Restaurantes — Tokyo</h3>
      <button class="close-btn" onclick="toggleRestaurantGuide()">×</button>
    </div>
    <div id="restaurant-guide-content"></div>
  </div>

  <!-- Tokyo Guide Panel (overlay) -->
  <div id="tokyo-guide-panel" class="overlay-panel hidden">
    <div class="overlay-header">
      <h3>Guia Tokyo — Lojas, Discos, Arquitetura</h3>
      <button class="close-btn" onclick="toggleTokyoGuide()">×</button>
    </div>
    <div id="tokyo-guide-content"></div>
  </div>

  <!-- Reservations Modal -->
  <div id="reservations-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeReservations()">
  </div>

  <script src="app.js?v=41"></script>
</body>
</html>
