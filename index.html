<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Japan 2026 — Luigi & Isabella</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇯🇵</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Splash Screen -->
<div id="splash" class="splash">
  <div class="splash-content">
    <div class="splash-kanji">日本</div>
    <div class="splash-title">Japan 2026</div>
    <div class="splash-subtitle">Luigi & Isabella</div>
    <div class="splash-dates">13 Abril — 05 Maio</div>
    <button class="splash-btn" onclick="closeSplash()">Explorar</button>
  </div>
</div>

<!-- Main App -->
<div id="app" class="app hidden">

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="header-city" id="headerCity">Nagano</div>
      <button class="header-btn" onclick="toggleFlights()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.4-.1.9.3 1.1l6.4 3.1-3.5 3.5-2.1-.4c-.4-.1-.8 0-1 .3l-.2.3c-.2.3-.1.8.2 1l3.3 2.4 2.4 3.3c.3.3.7.4 1 .2l.3-.2c.3-.3.4-.7.3-1l-.4-2.1 3.5-3.5 3.1 6.4c.2.4.7.5 1.1.3l.5-.3c.4-.2.6-.6.5-1.1z"/></svg>
      </button>
    </div>
    <div class="header-dates" id="headerDates">15/04 — 19/04 | 4 noites</div>
  </header>

  <!-- Mood Filter -->
  <div class="mood-bar" id="moodBar">
    <button class="mood-chip active" data-mood="all" onclick="filterMood('all')">Tudo</button>
    <button class="mood-chip" data-mood="food" onclick="filterMood('food')">
      <span>🍜</span> Comer
    </button>
    <button class="mood-chip" data-mood="culture" onclick="filterMood('culture')">
      <span>⛩️</span> Cultura
    </button>
    <button class="mood-chip" data-mood="shop" onclick="filterMood('shop')">
      <span>🛍️</span> Compras
    </button>
    <button class="mood-chip" data-mood="nature" onclick="filterMood('nature')">
      <span>🌿</span> Natureza
    </button>
    <button class="mood-chip" data-mood="night" onclick="filterMood('night')">
      <span>🌙</span> Noite
    </button>
    <button class="mood-chip" data-mood="photo" onclick="filterMood('photo')">
      <span>📷</span> Foto
    </button>
  </div>

  <!-- Flights Panel -->
  <div class="flights-panel hidden" id="flightsPanel">
    <div class="flights-header">
      <h3>Voos</h3>
      <button onclick="toggleFlights()" class="close-btn">&times;</button>
    </div>
    <div class="flights-list" id="flightsList"></div>
  </div>

  <!-- Reservations Banner -->
  <div class="reservations-banner hidden" id="resBanner" onclick="showReservations()">
    <span class="res-dot"></span>
    <span id="resBannerText">1 reserva hoje</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
  </div>

  <!-- Day Tabs -->
  <div class="day-tabs" id="dayTabs"></div>

  <!-- Activities -->
  <div class="activities" id="activities"></div>

  <!-- Hotel Card -->
  <div class="hotel-card" id="hotelCard"></div>

  <!-- Gastronomia Section -->
  <div class="gastro-section" id="gastroSection"></div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottomNav"></nav>

</div>

<!-- Reservations Modal -->
<div class="modal hidden" id="resModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Reservas</h3>
      <button onclick="closeReservations()" class="close-btn">&times;</button>
    </div>
    <div class="modal-body" id="resBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
